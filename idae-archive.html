```html
<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>idae archive — cosmic memory vault</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Cormorant+Garamond:wght@300;400;500;600&family=Bodoni+Moda:opsz,wght@6..96,400;6..96,500&display=swap" rel="stylesheet">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

:root{
  --space-deep:#04040a;
  --space-mid:#0c1020;
  --surface-glass:rgba(255,255,255,.06);
  --surface-border:rgba(255,255,255,.12);
  --text-primary:rgba(255,255,255,.92);
  --text-muted:rgba(255,255,255,.42);
  --accent-pink:#ff7bc4;
  --accent-purple:#b08cff;
  --accent-cyan:#71ecff;
  --accent-gold:#ffe38f;
}

html,
body{
  width:100%;
  height:100%;
  overflow:hidden;
  background:
  radial-gradient(circle at top,#18203a 0%,#080910 45%,#030307 100%);
  color:white;
  font-family:'Cormorant Garamond',serif;
}

body::before{
  content:'';
  position:fixed;
  inset:0;
  background-image:
    radial-gradient(rgba(255,255,255,.04) 1px, transparent 1px);
  background-size:4px 4px;
  mix-blend-mode:soft-light;
  opacity:.35;
  pointer-events:none;
}

.screen{
  position:absolute;
  inset:0;
  display:flex;
  align-items:center;
  justify-content:center;
  transition:
  opacity .8s ease,
  transform .8s ease;
}

.hidden{
  opacity:0;
  pointer-events:none;
  transform:scale(1.04);
}

/* -------------------------
   ambient stars
------------------------- */

.star-layer{
  position:absolute;
  inset:0;
  overflow:hidden;
  pointer-events:none;
}

.star{
  position:absolute;
  border-radius:50%;
  animation:twinkle linear infinite;
}

@keyframes twinkle{
  0%,100%{
    opacity:.2;
    transform:scale(.8);
  }
  50%{
    opacity:1;
    transform:scale(1.5);
  }
}

/* -------------------------
 landing
------------------------- */

#landing{
  flex-direction:column;
}

.landing-center{
  position:relative;
  z-index:10;
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:40px;
}

.hero-star{
  position:relative;
  width:min(42vw,360px);
  aspect-ratio:1;
  animation:cosmic-breathe 5s ease-in-out infinite;
}

.hero-star::before,
.hero-star::after{
  content:'';
  position:absolute;
  inset:0;
  background:
  radial-gradient(circle at center,
  rgba(255,255,255,.9) 0%,
  rgba(255,195,220,.9) 10%,
  rgba(255,130,190,.45) 30%,
  transparent 72%);
}

.hero-star::after{
  filter:blur(40px);
}

.hero-shape{
  position:absolute;
  inset:0;
  clip-path:polygon(
  50% 0%,
  56% 44%,
  100% 50%,
  56% 56%,
  50% 100%,
  44% 56%,
  0% 50%,
  44% 44%
  );
  background:
  linear-gradient(135deg,
  #fff,
  #ffd1ec,
  #ff87c5,
  #fff3c2);
  filter:drop-shadow(0 0 40px rgba(255,123,196,.8));
}

@keyframes cosmic-breathe{
  0%,100%{
    transform:scale(1);
    filter:brightness(1);
  }
  50%{
    transform:scale(1.05);
    filter:brightness(1.18);
  }
}

.hero-title{
  position:absolute;
  inset:0;
  display:flex;
  align-items:center;
  justify-content:center;
  font-family:'Great Vibes',cursive;
  font-size:clamp(3rem,7vw,5rem);
  color:#fff5fb;
  text-shadow:
  0 0 20px rgba(255,123,196,.8),
  0 0 60px rgba(255,123,196,.5);
}

.hero-sub{
  letter-spacing:.35em;
  text-transform:uppercase;
  color:rgba(255,255,255,.5);
  font-size:.75rem;
}

.start-btn{
  position:relative;
  border:none;
  background:rgba(255,255,255,.06);
  backdrop-filter:blur(20px);
  border:1px solid rgba(255,255,255,.12);
  color:white;
  width:180px;
  height:58px;
  border-radius:999px;
  cursor:pointer;
  overflow:hidden;
  transition:.4s ease;
  box-shadow:
  0 0 40px rgba(176,140,255,.15),
  inset 0 0 30px rgba(255,255,255,.04);
}

.start-btn span{
  position:relative;
  z-index:2;
  font-family:'Bodoni Moda',serif;
  letter-spacing:.3em;
  font-size:.9rem;
}

.start-btn::before{
  content:'';
  position:absolute;
  width:120px;
  height:120px;
  background:radial-gradient(circle,
  rgba(255,255,255,.45),transparent 70%);
  left:-20px;
  top:-30px;
  transition:.5s ease;
}

.start-btn:hover{
  transform:translateY(-4px) scale(1.02);
  box-shadow:
  0 0 60px rgba(255,123,196,.3),
  0 0 120px rgba(176,140,255,.25);
}

.start-btn:hover::before{
  transform:translateX(120px);
}

/* -------------------------
 archive
------------------------- */

#archive{
  background:
  radial-gradient(circle at bottom,
  #172648 0%,
  #090d18 40%,
  #020207 100%);
}

.topbar{
  position:absolute;
  top:0;
  left:0;
  width:100%;
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:
  calc(env(safe-area-inset-top) + 24px)
  28px
  24px;
  z-index:20;
}

.brand{
  font-family:'Great Vibes',cursive;
  font-size:2rem;
  color:#ffe6f4;
}

.add-btn{
  width:56px;
  aspect-ratio:1;
  border-radius:50%;
  border:1px solid rgba(255,255,255,.15);
  background:rgba(255,255,255,.06);
  backdrop-filter:blur(18px);
  color:white;
  font-size:1.7rem;
  cursor:pointer;
  transition:.4s ease;
}

.add-btn:hover{
  transform:rotate(90deg) scale(1.08);
  box-shadow:0 0 40px rgba(255,123,196,.45);
}

.orb-space{
  position:absolute;
  inset:0;
  overflow-y:auto;
  padding-top:140px;
  padding-bottom:120px;
  scrollbar-width:none;
}

.orb-space::-webkit-scrollbar{
  display:none;
}

.orb-field{
  min-height:100%;
  display:flex;
  flex-direction:column-reverse;
  align-items:center;
  gap:10px;
}

.orb-item{
  position:relative;
  border-radius:50%;
  cursor:pointer;
  transition:.5s ease;
  animation:float 7s ease-in-out infinite;
}

.orb-core{
  width:100%;
  height:100%;
  border-radius:50%;
}

.orb-glow{
  position:absolute;
  inset:-16px;
  border-radius:50%;
  filter:blur(20px);
  opacity:.7;
}

.orb-preview{
  position:absolute;
  top:110%;
  left:50%;
  transform:translateX(-50%) translateY(12px);
  width:max-content;
  max-width:180px;
  text-align:center;
  opacity:0;
  transition:.4s ease;
  pointer-events:none;
}

.orb-preview-title{
  font-size:.95rem;
  color:rgba(255,255,255,.82);
}

.orb-preview-date{
  margin-top:4px;
  font-size:.7rem;
  letter-spacing:.15em;
  color:rgba(255,255,255,.38);
}

.orb-item:hover{
  transform:scale(1.08);
}

.orb-item:hover .orb-preview{
  opacity:1;
  transform:translateX(-50%) translateY(0);
}

@keyframes float{
  0%,100%{
    transform:translateY(0px);
  }
  50%{
    transform:translateY(-16px);
  }
}

.empty-state{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  text-align:center;
  color:rgba(255,255,255,.25);
  line-height:2;
}

/* -------------------------
 input
------------------------- */

#input{
  background:
  radial-gradient(circle at top left,
  #291348 0%,
  #0c1020 40%,
  #030307 100%);
}

.input-wrap{
  width:min(90vw,720px);
  display:flex;
  flex-direction:column;
  gap:28px;
  position:relative;
  z-index:10;
}

.input-label{
  text-transform:uppercase;
  letter-spacing:.3em;
  font-size:.72rem;
  color:rgba(255,255,255,.5);
}

textarea{
  width:100%;
  min-height:240px;
  border-radius:28px;
  border:1px solid rgba(255,255,255,.12);
  background:rgba(255,255,255,.05);
  backdrop-filter:blur(20px);
  padding:32px;
  color:white;
  font-family:'Cormorant Garamond',serif;
  font-size:1.4rem;
  line-height:1.9;
  resize:none;
  outline:none;
  transition:.5s ease;
  box-shadow:
  inset 0 0 50px rgba(176,140,255,.06),
  0 0 80px rgba(176,140,255,.05);
}

textarea:focus{
  border-color:rgba(176,140,255,.45);
  box-shadow:
  inset 0 0 60px rgba(176,140,255,.12),
  0 0 120px rgba(176,140,255,.15);
}

textarea::placeholder{
  color:rgba(255,255,255,.25);
  font-style:italic;
}

.finish-btn{
  align-self:center;
  padding:16px 52px;
  border-radius:999px;
  border:1px solid rgba(255,255,255,.12);
  background:rgba(255,255,255,.08);
  color:white;
  font-family:'Bodoni Moda',serif;
  letter-spacing:.3em;
  cursor:pointer;
  transition:.4s ease;
  backdrop-filter:blur(20px);
}

.finish-btn:hover{
  transform:translateY(-3px);
  box-shadow:
  0 0 50px rgba(255,123,196,.25),
  0 0 100px rgba(176,140,255,.18);
}

.back-btn{
  position:absolute;
  top:40px;
  left:28px;
  border:none;
  background:rgba(255,255,255,.06);
  border:1px solid rgba(255,255,255,.1);
  color:rgba(255,255,255,.7);
  padding:10px 18px;
  border-radius:999px;
  cursor:pointer;
}

/* -------------------------
 detail
------------------------- */

#detail{
  background:
  radial-gradient(circle at center,
  #15223d 0%,
  #080b13 45%,
  #020207 100%);
}

.detail-wrap{
  width:min(90vw,760px);
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:28px;
}

.detail-orb{
  position:relative;
  width:220px;
  aspect-ratio:1;
  border-radius:50%;
  animation:float 8s ease-in-out infinite;
}

.detail-glow{
  position:absolute;
  inset:-40px;
  border-radius:50%;
  filter:blur(40px);
}

.detail-core{
  position:absolute;
  inset:0;
  border-radius:50%;
}

.detail-date{
  letter-spacing:.25em;
  text-transform:uppercase;
  font-size:.72rem;
  color:rgba(255,255,255,.35);
}

.detail-text{
  width:min(90%,44ch);
  text-align:center;
  font-size:clamp(1.2rem,2vw,1.55rem);
  line-height:1.9;
  color:rgba(255,255,255,.9);
}

.detail-actions{
  display:flex;
  gap:14px;
}

.action-btn{
  border:none;
  border-radius:999px;
  padding:12px 24px;
  background:rgba(255,255,255,.06);
  border:1px solid rgba(255,255,255,.1);
  color:white;
  cursor:pointer;
}

/* -------------------------
 responsive
------------------------- */

@media(max-width:768px){

  .hero-star{
    width:300px;
  }

  .topbar{
    padding-top:calc(env(safe-area-inset-top) + 18px);
  }

  textarea{
    min-height:220px;
    font-size:1.2rem;
    padding:26px;
  }

  .detail-orb{
    width:180px;
  }

}

</style>
</head>
<body>

<!-- landing -->
<section class="screen" id="landing">

  <div class="star-layer" id="landing-stars"></div>

  <div class="landing-center">

    <div class="hero-star">
      <div class="hero-shape"></div>
      <div class="hero-title">idae archive</div>
    </div>

    <div class="hero-sub">cosmic memory vault</div>

    <button class="start-btn" id="startBtn">
      <span>ENTER</span>
    </button>

  </div>

</section>

<!-- archive -->
<section class="screen hidden" id="archive">

  <div class="star-layer" id="archive-stars"></div>

  <div class="topbar">
    <div class="brand">idae archive</div>
    <button class="add-btn" id="addBtn">+</button>
  </div>

  <div class="orb-space">
    <div class="orb-field" id="orbField">

      <div class="empty-state" id="emptyState">
        ✦<br><br>
        아직 저장된 기억이 없어요
      </div>

    </div>
  </div>

</section>

<!-- input -->
<section class="screen hidden" id="input">

  <div class="star-layer" id="input-stars"></div>

  <button class="back-btn" id="backFromInput">← back</button>

  <div class="input-wrap">

    <div class="input-label">write your memory</div>

    <textarea
      id="ideaInput"
      placeholder="당신의 생각을 우주에 남겨보세요..."
    ></textarea>

    <button class="finish-btn" id="saveBtn">
      FINISH
    </button>

  </div>

</section>

<!-- detail -->
<section class="screen hidden" id="detail">

  <div class="star-layer" id="detail-stars"></div>

  <button class="back-btn" id="backFromDetail">← back</button>

  <div class="detail-wrap">

    <div class="detail-orb">
      <div class="detail-glow" id="detailGlow"></div>
      <div class="detail-core" id="detailCore"></div>
    </div>

    <div class="detail-date" id="detailDate"></div>

    <div class="detail-text" id="detailText"></div>

    <div class="detail-actions">
      <button class="action-btn" id="deleteBtn">delete</button>
    </div>

  </div>

</section>

<script>

const screens={
  landing:document.getElementById('landing'),
  archive:document.getElementById('archive'),
  input:document.getElementById('input'),
  detail:document.getElementById('detail')
}

function showScreen(name){
  Object.entries(screens).forEach(([key,el])=>{
    if(key===name) el.classList.remove('hidden')
    else el.classList.add('hidden')
  })
}

function createStars(container,count){

  const colors=[
    '#ffffff',
    '#ff9dd2',
    '#71ecff',
    '#ffe38f',
    '#c3a8ff'
  ]

  for(let i=0;i<count;i++){

    const star=document.createElement('div')
    star.className='star'

    const size=Math.random()*3+1

    star.style.width=size+'px'
    star.style.height=size+'px'
    star.style.left=Math.random()*100+'%'
    star.style.top=Math.random()*100+'%'
    star.style.background=
      colors[Math.floor(Math.random()*colors.length)]

    star.style.animationDuration=
      2+Math.random()*4+'s'

    star.style.animationDelay=
      Math.random()*4+'s'

    star.style.boxShadow=
      `0 0 ${size*4}px currentColor`

    container.appendChild(star)
  }
}

createStars(document.getElementById('landing-stars'),120)
createStars(document.getElementById('archive-stars'),90)
createStars(document.getElementById('input-stars'),80)
createStars(document.getElementById('detail-stars'),70)

const ORBS=[
  {
    bg:'radial-gradient(circle,#fff4d9 0%,#ff9ecf 25%,#ff5ca8 55%,#8d2fff 100%)',
    glow:'rgba(255,123,196,.5)'
  },
  {
    bg:'radial-gradient(circle,#ffffff 0%,#9cecff 30%,#4ec7ff 60%,#416dff 100%)',
    glow:'rgba(113,236,255,.45)'
  },
  {
    bg:'radial-gradient(circle,#fff7bf 0%,#ffe182 20%,#ffb85e 50%,#ff6d7c 100%)',
    glow:'rgba(255,227,143,.4)'
  },
  {
    bg:'radial-gradient(circle,#ffffff 0%,#dfc4ff 30%,#9e6cff 60%,#3e1f7c 100%)',
    glow:'rgba(176,140,255,.45)'
  }
]

function randomOrb(){
  return ORBS[Math.floor(Math.random()*ORBS.length)]
}

let ideas=
JSON.parse(localStorage.getItem('idae-memory')||'[]')

let currentId=null

function saveIdeas(){
  localStorage.setItem(
    'idae-memory',
    JSON.stringify(ideas)
  )
}

function renderIdeas(){

  const field=document.getElementById('orbField')
  const empty=document.getElementById('emptyState')

  field.querySelectorAll('.orb-item').forEach(el=>el.remove())

  if(ideas.length===0){
    empty.style.display='block'
    return
  }

  empty.style.display='none'

  ideas.forEach((idea,index)=>{

    const orb=document.createElement('div')
    orb.className='orb-item'

    const size=
      Math.min(90+idea.text.length*.25,170)

    orb.style.width=size+'px'
    orb.style.height=size+'px'

    orb.style.marginLeft=
      ['-18%','8%','22%','-12%'][index%4]

    const glow=document.createElement('div')
    glow.className='orb-glow'
    glow.style.background=idea.orb.glow

    const core=document.createElement('div')
    core.className='orb-core'
    core.style.background=idea.orb.bg
    core.style.boxShadow=
      `0 0 60px ${idea.orb.glow}`

    const preview=document.createElement('div')
    preview.className='orb-preview'

    preview.innerHTML=`
      <div class="orb-preview-title">
        ${idea.text.substring(0,24)}
      </div>
      <div class="orb-preview-date">
        ${new Date(idea.createdAt).toLocaleDateString('ko-KR')}
      </div>
    `

    orb.appendChild(glow)
    orb.appendChild(core)
    orb.appendChild(preview)

    orb.onclick=()=>openDetail(idea.id)

    field.prepend(orb)

  })
}

function openDetail(id){

  currentId=id

  const idea=ideas.find(i=>i.id===id)

  document.getElementById('detailCore').style.background=
    idea.orb.bg

  document.getElementById('detailCore').style.boxShadow=
    `0 0 90px ${idea.orb.glow}`

  document.getElementById('detailGlow').style.background=
    idea.orb.glow

  document.getElementById('detailDate').textContent=
    new Date(idea.createdAt)
    .toLocaleDateString('ko-KR',{
      year:'numeric',
      month:'long',
      day:'numeric'
    })

  document.getElementById('detailText').textContent=
    idea.text

  showScreen('detail')
}

// landing

document.getElementById('startBtn').onclick=()=>{
  showScreen('archive')
  renderIdeas()
}

// add

document.getElementById('addBtn').onclick=()=>{
  document.getElementById('ideaInput').value=''
  showScreen('input')
}

// save

document.getElementById('saveBtn').onclick=()=>{

  const text=
    document.getElementById('ideaInput').value.trim()

  if(!text) return

  ideas.push({
    id:Date.now(),
    text,
    createdAt:Date.now(),
    orb:randomOrb()
  })

  saveIdeas()
  renderIdeas()
  showScreen('archive')
}

// delete

document.getElementById('deleteBtn').onclick=()=>{

  ideas=ideas.filter(i=>i.id!==currentId)

  saveIdeas()
  renderIdeas()
  showScreen('archive')
}

// back buttons

document.getElementById('backFromInput').onclick=()=>{
  showScreen('archive')
}

document.getElementById('backFromDetail').onclick=()=>{
  showScreen('archive')
}

</script>

</body>
</html>
```
