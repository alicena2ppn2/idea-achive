<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>idea archive</title>
<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Bodoni+Moda:ital,wght@1,400;1,500&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Noto+Serif+KR:wght@300&family=Jeju+Gothic&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg-dark: #050508;
    --pink: #f472b6;
    --pink-glow: rgba(244,114,182,0.6);
    --blue-star: #67e8f9;
    --purple: #a78bfa;
    --yellow: #fde68a;
    --green: #86efac;
  }

  body {
    font-family: 'Cormorant Garamond', serif;
    background: var(--bg-dark);
    color: white;
    overflow: hidden;
    height: 100vh;
    width: 100vw;
    cursor: default;
  }
  /* Korean text — 마루부리 (Noto Serif KR Light) */
  :lang(ko), .ko,
  .empty-state, .input-prompt, .idea-textarea, .idea-textarea::placeholder,
  .detail-text, .detail-edit-area, .detail-date, .similar-label,
  .notif, .archive-title { 
    font-family: 'Noto Serif KR', serif;
    font-weight: 300;
  }

  /* ─── SCREENS ─── */
  .screen {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: opacity 0.8s ease;
  }
  .screen.hidden { opacity: 0; pointer-events: none; }

  /* ─── STAR PARTICLE ─── */
  .star-particle {
    position: absolute;
    pointer-events: none;
    animation: twinkle var(--dur, 3s) ease-in-out infinite var(--delay, 0s);
  }
  @keyframes twinkle {
    0%, 100% { opacity: var(--min-op, 0.3); transform: scale(1); }
    50% { opacity: 1; transform: scale(1.3); }
  }

  /* ══════════════════════════════
     SCREEN 1 — LANDING
  ══════════════════════════════ */
  #screen-landing {
    background: radial-gradient(ellipse at 50% 80%, #1a3a4a 0%, #0a1520 40%, #050508 70%);
    flex-direction: column;
    gap: 0;
  }

  .landing-bg {
    position: absolute;
    inset: 0;
    overflow: hidden;
  }

  /* Central starburst */
  .starburst {
    position: relative;
    width: 340px;
    height: 340px;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 2;
  }

  @keyframes pulse-star {
    0%, 100% { filter: drop-shadow(0 0 40px rgba(244,114,182,0.5)); }
    50% { filter: drop-shadow(0 0 80px rgba(244,114,182,0.9)); }
  }

  .title-text {
    position: relative;
    z-index: 3;
    text-align: center;
  }

  .title-text h1 {
    font-family: 'Great Vibes', cursive;
    font-size: 6rem;
    color: #fce4ec;
    text-shadow: 0 0 20px rgba(255,255,255,0.8), 0 0 40px rgba(255,255,255,0.4);
    line-height: 1;
    letter-spacing: 0.02em;
  }

  /* START button */
  .start-btn-wrap {
    position: relative;
    z-index: 10;
    margin-top: 50px;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  .start-btn {
    position: relative;
    background: transparent;
    border: none;
    cursor: pointer;
    padding: 0;
    width: 140px;
    height: 48px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .start-btn-inner {
    position: relative;
    width: 100%;
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .start-btn-box {
    position: absolute;
    inset: 0;
    border: 1.5px solid rgba(244,114,182,0.7);
    border-radius: 20px;
    background: rgba(244,114,182,0.05);
    box-shadow: 0 0 20px rgba(244,114,182,0.3), inset 0 0 20px rgba(244,114,182,0.05);
    animation: btn-shimmer 3s ease-in-out infinite;
  }
  @keyframes btn-shimmer {
    0%, 100% { box-shadow: 0 0 20px rgba(244,114,182,0.3), inset 0 0 20px rgba(244,114,182,0.05); border-color: rgba(244,114,182,0.7); }
    50% { box-shadow: 0 0 40px rgba(244,114,182,0.7), 0 0 80px rgba(244,114,182,0.2), inset 0 0 30px rgba(244,114,182,0.1); border-color: rgba(244,114,182,1); }
  }

  /* corner sparks */
  .start-btn-box::before, .start-btn-box::after {
    content: '✦';
    position: absolute;
    font-size: 10px;
    color: var(--pink);
    animation: corner-twinkle 2s ease-in-out infinite;
  }
  .start-btn-box::before { top: -8px; left: -8px; }
  .start-btn-box::after { bottom: -8px; right: -8px; animation-delay: 1s; }
  @keyframes corner-twinkle {
    0%, 100% { opacity: 0.4; transform: scale(0.8); }
    50% { opacity: 1; transform: scale(1.4); }
  }

  .start-btn span {
    font-family: 'Bodoni Moda', serif;
    font-style: italic;
    font-size: 1.1rem;
    letter-spacing: 0.35em;
    color: rgba(252,228,236,0.95);
    text-transform: uppercase;
    position: relative;
    z-index: 1;
    text-shadow: 0 0 20px rgba(244,114,182,0.8);
  }

  .start-btn:hover .start-btn-box {
    box-shadow: 0 0 60px rgba(244,114,182,0.9), 0 0 120px rgba(244,114,182,0.4), inset 0 0 40px rgba(244,114,182,0.15);
    border-color: white;
    background: rgba(244,114,182,0.1);
  }
  .start-btn:hover span { color: white; }

  /* ══════════════════════════════
     TRANSITION OVERLAY
  ══════════════════════════════ */
  #transition-overlay {
    position: fixed;
    inset: 0;
    z-index: 100;
    pointer-events: none;
    opacity: 0;
    background: var(--bg-dark);
  }

  .transition-stars {
    position: absolute;
    inset: 0;
    overflow: hidden;
  }

  /* ══════════════════════════════
     SCREEN 2 — ARCHIVE
  ══════════════════════════════ */
  #screen-archive {
    background: radial-gradient(ellipse at 50% 100%, #0d1f3c 0%, #050810 50%, #020305 100%);
    flex-direction: column;
    overflow: hidden;
  }

  .archive-header {
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    padding: 24px 32px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    z-index: 20;
    background: linear-gradient(to bottom, rgba(2,3,5,0.9) 0%, transparent 100%);
  }

  .archive-title {
    font-family: 'Great Vibes', cursive;
    font-size: 1.8rem;
    color: #fce4ec;
    text-shadow: 0 0 20px rgba(255,255,255,0.8), 0 0 40px rgba(255,255,255,0.4);
  }

  .add-btn {
    width: 48px;
    height: 48px;
    border-radius: 50%;
    border: 1.5px solid rgba(244,114,182,0.6);
    background: rgba(244,114,182,0.08);
    color: var(--pink);
    font-size: 1.5rem;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.3s ease;
    box-shadow: 0 0 20px rgba(244,114,182,0.2);
    line-height: 1;
  }
  .add-btn:hover {
    background: rgba(244,114,182,0.2);
    box-shadow: 0 0 40px rgba(244,114,182,0.5);
    transform: scale(1.1) rotate(90deg);
    border-color: var(--pink);
  }

  /* Orb container - scrollable */
  .orb-space {
    position: absolute;
    inset: 0;
    overflow-y: auto;
    overflow-x: hidden;
    padding: 100px 20px 120px;
    scrollbar-width: none;
  }
  .orb-space::-webkit-scrollbar { display: none; }

  .orb-field {
    min-height: 100%;
    position: relative;
    display: flex;
    flex-direction: column-reverse;
    align-items: center;
    gap: 0;
    padding-bottom: 40px;
  }

  .empty-state {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    text-align: center;
    color: rgba(255,255,255,0.2);
    font-size: 0.9rem;
    letter-spacing: 0.15em;
    line-height: 2;
    pointer-events: none;
  }
  .empty-state .empty-icon {
    font-size: 2rem;
    display: block;
    margin-bottom: 12px;
    opacity: 0.3;
  }

  /* STAR ITEM */
  .star-item {
    position: relative;
    margin: 10px auto;
    cursor: pointer;
    animation: star-float var(--float-dur, 6s) ease-in-out infinite var(--float-delay, 0s);
    transition: transform 0.3s ease;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: visible;
  }

  /* Stagger horizontal */
  .star-item:nth-child(3n+1) { margin-left: 15%; }
  .star-item:nth-child(3n+2) { margin-left: -10%; }
  .star-item:nth-child(3n+3) { margin-left: 5%; }

  @keyframes star-float {
    0%, 100% { transform: translateY(0px) rotate(var(--rot, 0deg)); }
    50% { transform: translateY(-14px) rotate(var(--rot, 0deg)); }
  }

  .star-item:hover { transform: scale(1.18) rotate(var(--rot, 0deg)); filter: brightness(1.3); }

  .star-svg {
    overflow: visible;
    display: block;
  }

  .star-glow-ring {
    position: absolute;
    inset: -30px;
    border-radius: 50%;
    background: radial-gradient(circle, var(--glow-color, rgba(244,114,182,0.35)) 0%, transparent 65%);
    animation: star-pulse 4s ease-in-out infinite var(--float-delay, 0s);
    pointer-events: none;
  }
  @keyframes star-pulse {
    0%, 100% { opacity: 0.5; transform: scale(0.9); }
    50% { opacity: 1; transform: scale(1.15); }
  }

  /* ══════════════════════════════
     SCREEN 3 — INPUT
  ══════════════════════════════ */
  #screen-input {
    background: radial-gradient(ellipse at 50% 100%, #0d1f3c 0%, #050810 50%, #020305 100%);
    flex-direction: column;
    gap: 0;
    overflow: hidden;
  }

  .input-header {
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    padding: 24px 32px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    z-index: 20;
  }

  .back-btn {
    background: transparent;
    border: 1px solid rgba(255,255,255,0.2);
    color: rgba(255,255,255,0.6);
    padding: 8px 20px;
    border-radius: 20px;
    cursor: pointer;
    font-family: 'Bodoni Moda', serif;
    font-style: italic;
    font-size: 0.9rem;
    letter-spacing: 0.1em;
    transition: all 0.3s;
  }
  .back-btn:hover { border-color: rgba(255,255,255,0.5); color: white; }

  .input-title {
    font-family: 'Great Vibes', cursive;
    font-size: 2.3rem;
    color: rgba(252,228,236,0.65);
    text-shadow: 0 0 20px rgba(167,139,250,0.4);
  }

  /* Nebula background particles for input */
  .input-nebula {
    position: absolute;
    inset: 0;
    overflow: hidden;
    pointer-events: none;
  }

  .nebula-orb {
    position: absolute;
    border-radius: 50%;
    filter: blur(60px);
    opacity: 0.15;
    animation: nebula-drift var(--nd, 8s) ease-in-out infinite var(--ndelay, 0s) alternate;
  }
  @keyframes nebula-drift {
    0% { transform: translate(0, 0) scale(1); }
    100% { transform: translate(var(--dx, 20px), var(--dy, 20px)) scale(1.1); }
  }

  .input-center {
    position: relative;
    z-index: 10;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 32px;
    width: 100%;
    max-width: 640px;
    padding: 0 32px;
  }

  .input-prompt {
    font-size: 0.78rem;
    letter-spacing: 0.28em;
    color: rgba(220, 210, 255, 0.95);
    text-transform: uppercase;
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
  }

  .idea-textarea {
    width: 100%;
    height: auto;
    min-height: 56px;
    background: rgba(30, 55, 100, 0.75);
    border: 1.5px solid rgba(170, 180, 240, 0.5);
    border-radius: 28px;
    padding: 16px 28px;
    color: rgba(235, 245, 255, 0.92);
    font-family: 'Jeju Gothic', sans-serif;
    font-weight: 400;
    font-size: 1.1rem;
    font-style: normal;
    line-height: 1.7;
    resize: none;
    outline: none;
    overflow: hidden;
    transition: border-color 0.4s, box-shadow 0.4s, background 0.4s, border-radius 0.3s;
    caret-color: rgba(103, 232, 249, 0.9);
    box-shadow: 0 2px 40px rgba(0,0,0,0.4), inset 0 1px 0 rgba(103,232,249,0.06);
  }
  .idea-textarea::placeholder {
    color: rgba(167,139,250,0.6);
    font-style: normal;
    font-family: 'Jeju Gothic', sans-serif;
  }
  .idea-textarea:focus {
    border-color: rgba(170, 180, 240, 0.75);
    background: rgba(35, 65, 115, 0.85);
    box-shadow: 0 0 50px rgba(103,232,249,0.15), 0 0 20px rgba(167,139,250,0.1), 0 2px 40px rgba(0,0,0,0.4), inset 0 1px 0 rgba(103,232,249,0.15);
  }

  /* Similar ideas that float nearby */
  .similar-ideas {
    position: absolute;
    right: -180px;
    top: 50%;
    transform: translateY(-50%);
    display: flex;
    flex-direction: column;
    gap: 16px;
    pointer-events: none;
  }

  .similar-orb {
    display: flex;
    align-items: center;
    gap: 10px;
    opacity: 0;
    transform: translateX(20px);
    transition: all 0.5s ease;
    cursor: pointer;
    pointer-events: all;
  }
  .similar-orb.visible {
    opacity: 1;
    transform: translateX(0);
    animation: similar-float 4s ease-in-out infinite;
  }
  @keyframes similar-float {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-5px); }
  }

  .similar-orb-img {
    width: 44px;
    height: 44px;
    border-radius: 50%;
    object-fit: cover;
    filter: brightness(0.8);
  }

  .similar-label {
    font-size: 0.7rem;
    color: rgba(255,255,255,0.5);
    max-width: 100px;
    line-height: 1.3;
    letter-spacing: 0.05em;
  }

  /* FINISH button */
  .finish-btn {
    position: relative;
    background: rgba(170,180,240,0.05);
    border: 1.5px solid rgba(170,180,240,0.7);
    border-radius: 20px;
    width: 140px;
    height: 48px;
    padding: 0;
    color: rgba(220,215,255,0.95);
    font-family: 'Bodoni Moda', serif;
    font-style: italic;
    font-size: 1.1rem;
    letter-spacing: 0.35em;
    text-transform: uppercase;
    cursor: pointer;
    box-shadow: 0 0 20px rgba(170,180,240,0.3), inset 0 0 20px rgba(170,180,240,0.05);
    transition: all 0.4s ease;
    overflow: hidden;
    animation: finish-shimmer 3s ease-in-out infinite;
  }
  @keyframes finish-shimmer {
    0%, 100% { box-shadow: 0 0 20px rgba(170,180,240,0.3), inset 0 0 20px rgba(170,180,240,0.05); border-color: rgba(170,180,240,0.7); }
    50% { box-shadow: 0 0 40px rgba(170,180,240,0.7), 0 0 80px rgba(170,180,240,0.2), inset 0 0 30px rgba(170,180,240,0.1); border-color: rgba(170,180,240,1); }
  }
  .finish-btn::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, rgba(170,180,240,0.07), rgba(167,139,250,0.07));
    opacity: 0;
    transition: opacity 0.4s;
  }
  .finish-btn:hover {
    box-shadow: 0 0 60px rgba(170,180,240,0.9), 0 0 120px rgba(170,180,240,0.4), inset 0 0 40px rgba(170,180,240,0.15);
    border-color: white;
    background: rgba(170,180,240,0.1);
    color: white;
  }
  .finish-btn:hover::before { opacity: 1; }

  /* ══════════════════════════════
     SCREEN 4 — DETAIL
  ══════════════════════════════ */
  #screen-detail {
    background: radial-gradient(ellipse at 50% 50%, #0d1520 0%, #020305 100%);
    flex-direction: column;
    gap: 0;
  }

  .detail-header {
    position: absolute;
    top: 0; left: 0; right: 0;
    padding: 24px 32px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    z-index: 20;
  }

  .detail-star-hero {
    position: relative;
    width: 180px;
    height: 180px;
    margin-bottom: 24px;
    animation: star-float 6s ease-in-out infinite;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: visible;
  }
  .detail-orb-glow {
    position: absolute;
    inset: -30px;
    border-radius: 50%;
    background: radial-gradient(circle, var(--glow-color, rgba(167,139,250,0.4)) 0%, transparent 70%);
    animation: star-pulse 4s ease-in-out infinite;
  }

  .detail-content {
    position: relative;
    z-index: 10;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 20px;
    width: 100%;
    max-width: 560px;
    padding: 0 32px;
  }

  .detail-date {
    font-size: 0.75rem;
    letter-spacing: 0.2em;
    color: rgba(255,255,255,0.65);
    text-transform: uppercase;
  }

  .detail-text {
    font-family: 'Jeju Gothic', sans-serif;
    font-size: 1.2rem;
    line-height: 1.8;
    color: rgba(255,255,255,0.85);
    text-align: center;
    font-weight: 400;
  }

  .detail-edit-area {
    width: 100%;
    min-height: 120px;
    background: rgba(255,255,255,0.03);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 12px;
    padding: 16px 20px;
    color: rgba(255,255,255,0.9);
    font-family: 'Jeju Gothic', sans-serif;
    font-size: 1.1rem;
    line-height: 1.7;
    resize: none;
    outline: none;
    display: none;
  }
  .detail-edit-area:focus { border-color: rgba(167,139,250,0.5); }

  .detail-actions {
    display: flex;
    gap: 16px;
    margin-top: 8px;
  }

  .action-btn {
    background: transparent;
    border: 1px solid rgba(255,255,255,0.15);
    color: rgba(255,255,255,0.5);
    padding: 8px 24px;
    border-radius: 20px;
    cursor: pointer;
    font-family: 'Bodoni Moda', serif;
    font-style: italic;
    font-size: 0.9rem;
    letter-spacing: 0.1em;
    transition: all 0.3s;
  }
  .action-btn:hover { border-color: rgba(255,255,255,0.4); color: white; }
  .action-btn.delete { border-color: rgba(244,114,182,0.3); color: rgba(244,114,182,0.6); }
  .action-btn.delete:hover { border-color: var(--pink); color: var(--pink); background: rgba(244,114,182,0.05); }
  .action-btn.save { border-color: rgba(167,139,250,0.5); color: rgba(167,139,250,0.8); display: none; }
  .action-btn.save:hover { border-color: var(--purple); color: var(--purple); }

  /* ══════════════════════════════
     LAUNCH ANIMATION
  ══════════════════════════════ */
  .launch-star {
    position: fixed;
    z-index: 200;
    pointer-events: none;
    transition: all 0s;
    overflow: visible;
  }

  /* ══════════════════════════════
     FLOATING STARS (bg)
  ══════════════════════════════ */
  .bg-stars {
    position: absolute;
    inset: 0;
    pointer-events: none;
    overflow: hidden;
  }

  /* ══════════════════════════════
     NOTIFICATION
  ══════════════════════════════ */
  .notif {
    position: fixed;
    bottom: 40px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: rgba(20,10,40,0.9);
    border: 1px solid rgba(167,139,250,0.4);
    color: rgba(232,222,255,0.9);
    padding: 12px 28px;
    border-radius: 30px;
    font-size: 0.85rem;
    letter-spacing: 0.1em;
    opacity: 0;
    transition: all 0.4s ease;
    z-index: 500;
    backdrop-filter: blur(10px);
  }
  .notif.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  /* scrollbar for archive */
  .orb-space { scroll-behavior: smooth; }
</style>
</head>
<body>

<!-- ══ SCREEN 1: LANDING ══ -->
<div class="screen" id="screen-landing">
  <div class="landing-bg" id="landing-bg"></div>

  <div style="position:relative; z-index:5; display:flex; flex-direction:column; align-items:center;">
    <div class="starburst">
      <svg viewBox="0 0 340 340" xmlns="http://www.w3.org/2000/svg" style="position:absolute;inset:0;width:100%;height:100%;animation:pulse-star 4s ease-in-out infinite;">
        <defs>
          <radialGradient id="sg1" cx="50%" cy="50%" r="50%">
            <stop offset="0%" stop-color="#fff" stop-opacity="0.9"/>
            <stop offset="30%" stop-color="#f9a8d4" stop-opacity="0.8"/>
            <stop offset="70%" stop-color="#f472b6" stop-opacity="0.4"/>
            <stop offset="100%" stop-color="#be185d" stop-opacity="0"/>
          </radialGradient>
          <filter id="glow-filter">
            <feGaussianBlur stdDeviation="8" result="blur"/>
            <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
          </filter>
        </defs>
        <ellipse cx="170" cy="170" rx="130" ry="130" fill="url(#sg1)" opacity="0.3"/>
        <polygon points="170,10 178,168 170,330 162,168" fill="url(#sg1)" filter="url(#glow-filter)"/>
        <polygon points="10,170 168,178 330,170 168,162" fill="url(#sg1)" filter="url(#glow-filter)"/>
        <polygon points="50,50 166,166 60,280 154,170" fill="url(#sg1)" opacity="0.6" filter="url(#glow-filter)"/>
        <polygon points="290,50 174,166 280,280 186,170" fill="url(#sg1)" opacity="0.6" filter="url(#glow-filter)"/>

<script>
// ─── DATA ───────────────────────────────────────
let ideas = [];
let currentDetailId = null;
let isEditing = false;

// ─── PERSISTENT STORAGE (계정 연동 + localStorage 폴백) ─
const STORAGE_KEY = 'idea-archive-ideas';

async function loadIdeas() {
  try {
    if (window.storage) {
      const result = await window.storage.get(STORAGE_KEY);
      ideas = result ? JSON.parse(result.value) : [];
    } else {
      ideas = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
    }
  } catch (e) {
    try { ideas = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]'); } catch(_) { ideas = []; }
  }
  renderOrbs();
}

async function saveIdeas() {
  const data = JSON.stringify(ideas);
  try {
    if (window.storage) {
      await window.storage.set(STORAGE_KEY, data);
    } else {
      localStorage.setItem(STORAGE_KEY, data);
    }
  } catch (e) {
    try { localStorage.setItem(STORAGE_KEY, data); } catch(_) {}
  }
}

loadIdeas();

// Orb image sets from the 3 uploaded reference images
// We'll use CSS-generated orbs since we can't embed the actual images at this scale
// Using beautiful CSS radial gradients inspired by the uploaded orb images
// Star shape helpers
function starPath(cx, cy, outerR, innerR, points) {
  let d = '';
  for (let i = 0; i < points * 2; i++) {
    const angle = (i * Math.PI) / points - Math.PI / 2;
    const r = i % 2 === 0 ? outerR : innerR;
    const x = cx + r * Math.cos(angle);
    const y = cy + r * Math.sin(angle);
    d += (i === 0 ? 'M' : 'L') + x + ',' + y;
  }
  return d + 'Z';
}

// Chubby 4-point star for idea items (same as bg stars but bigger + colored)
function ideaStarPath(r) {
  const c = r * 0.18;
  const t = r * 0.22;
  return `M 0,${-r} C ${t},${-c} ${c},${-t} ${r},0 C ${c},${t} ${t},${c} 0,${r} C ${-t},${c} ${-c},${t} ${-r},0 C ${-c},${-t} ${-t},${-c} 0,${-r} Z`;
}

// Sizes for variety: each idea gets a random size tier
const STAR_SIZES = [29, 36, 44, 31, 39, 33, 47, 28, 41, 37];

const STAR_STYLES = [
  { fill: 'url(#sg-lavender)', glow: 'rgba(121,134,203,0.6)', defs: `<radialGradient id="sg-lavender" cx="35%" cy="35%" r="65%"><stop offset="0%" stop-color="#fff8e1"/><stop offset="30%" stop-color="#e8d5f5"/><stop offset="70%" stop-color="#b39ddb"/><stop offset="100%" stop-color="#5c6bc0"/></radialGradient>` },
  { fill: 'url(#sg-fire)', glow: 'rgba(229,57,53,0.6)', defs: `<radialGradient id="sg-fire" cx="50%" cy="40%" r="60%"><stop offset="0%" stop-color="#fff9c4"/><stop offset="25%" stop-color="#ffcc80"/><stop offset="60%" stop-color="#ff8a65"/><stop offset="100%" stop-color="#b71c1c"/></radialGradient>` },
  { fill: 'url(#sg-ocean)', glow: 'rgba(77,208,225,0.6)', defs: `<radialGradient id="sg-ocean" cx="40%" cy="40%" r="65%"><stop offset="0%" stop-color="#e1f5fe"/><stop offset="35%" stop-color="#4dd0e1"/><stop offset="70%" stop-color="#a5d6a7"/><stop offset="100%" stop-color="#9c8dda"/></radialGradient>` },
  { fill: 'url(#sg-pink)', glow: 'rgba(233,30,140,0.65)', defs: `<radialGradient id="sg-pink" cx="45%" cy="38%" r="62%"><stop offset="0%" stop-color="#fff9c4"/><stop offset="20%" stop-color="#ffcc02"/><stop offset="55%" stop-color="#ff6d8b"/><stop offset="100%" stop-color="#c2185b"/></radialGradient>` },
  { fill: 'url(#sg-nebula)', glow: 'rgba(179,229,252,0.65)', defs: `<radialGradient id="sg-nebula" cx="50%" cy="44%" r="58%"><stop offset="0%" stop-color="#ffffff"/><stop offset="20%" stop-color="#b3e5fc"/><stop offset="55%" stop-color="#c8e6c9"/><stop offset="80%" stop-color="#f8bbd0"/><stop offset="100%" stop-color="#b0bec5"/></radialGradient>` },
  { fill: 'url(#sg-aurora)', glow: 'rgba(255,64,129,0.5)', defs: `<radialGradient id="sg-aurora" cx="50%" cy="50%" r="55%"><stop offset="0%" stop-color="#ff4081"/><stop offset="25%" stop-color="#4dd0e1"/><stop offset="55%" stop-color="#ef9a9a"/><stop offset="100%" stop-color="#ffcc80"/></radialGradient>` },
  { fill: 'url(#sg-rose)', glow: 'rgba(233,30,99,0.65)', defs: `<radialGradient id="sg-rose" cx="40%" cy="40%" r="62%"><stop offset="0%" stop-color="#fce4ec"/><stop offset="25%" stop-color="#f48fb1"/><stop offset="60%" stop-color="#e91e63"/><stop offset="100%" stop-color="#880e4f"/></radialGradient>` },
  { fill: 'url(#sg-sky)', glow: 'rgba(41,182,246,0.6)', defs: `<radialGradient id="sg-sky" cx="45%" cy="38%" r="63%"><stop offset="0%" stop-color="#ffffff"/><stop offset="20%" stop-color="#e3f2fd"/><stop offset="50%" stop-color="#29b6f6"/><stop offset="100%" stop-color="#01579b"/></radialGradient>` },
  { fill: 'url(#sg-iris)', glow: 'rgba(206,147,216,0.6)', defs: `<radialGradient id="sg-iris" cx="40%" cy="35%" r="64%"><stop offset="0%" stop-color="#ffffff"/><stop offset="20%" stop-color="#e1f5fe"/><stop offset="50%" stop-color="#ce93d8"/><stop offset="100%" stop-color="#7b1fa2"/></radialGradient>` },
  { fill: 'url(#sg-ember)', glow: 'rgba(198,40,40,0.6)', defs: `<radialGradient id="sg-ember" cx="50%" cy="44%" r="58%"><stop offset="0%" stop-color="#ffcdd2"/><stop offset="25%" stop-color="#ef9a9a"/><stop offset="60%" stop-color="#c62828"/><stop offset="100%" stop-color="#4a0000"/></radialGradient>` },
  { fill: 'url(#sg-joy)', glow: 'rgba(255,255,255,0.7)', defs: `<radialGradient id="sg-joy" cx="50%" cy="50%" r="55%"><stop offset="0%" stop-color="#ffffff"/><stop offset="20%" stop-color="#fff9c4"/><stop offset="45%" stop-color="#e8f5e9"/><stop offset="70%" stop-color="#fce4ec"/><stop offset="100%" stop-color="#ede7f6"/></radialGradient>` },
  { fill: 'url(#sg-deep)', glow: 'rgba(106,27,154,0.6)', defs: `<radialGradient id="sg-deep" cx="45%" cy="48%" r="57%"><stop offset="0%" stop-color="#4a148c"/><stop offset="30%" stop-color="#6a1b9a"/><stop offset="65%" stop-color="#880e4f"/><stop offset="100%" stop-color="#1a237e"/></radialGradient>` },
];

function randomOrbStyle() {
  const s = STAR_STYLES[Math.floor(Math.random() * STAR_STYLES.length)];
  const size = STAR_SIZES[Math.floor(Math.random() * STAR_SIZES.length)];
  return { ...s, size };
}



// ─── STARS ──────────────────────────────────────
// Chubby 4-point star path (like the reference image) — cubic bezier curves
function chubbyStar4Path(r) {
  const c = r * 0.18;
  const t = r * 0.22;
  return `M 0,${-r} C ${t},${-c} ${c},${-t} ${r},0 C ${c},${t} ${t},${c} 0,${r} C ${-t},${c} ${-c},${t} ${-r},0 C ${-c},${-t} ${-t},${-c} 0,${-r} Z`;
}

function createStar8(container, x, y, size, color, dur, delay, minOp) {
  const ns = 'http://www.w3.org/2000/svg';
  const svg = document.createElementNS(ns, 'svg');
  svg.setAttribute('viewBox', `-${size} -${size} ${size*2} ${size*2}`);
  svg.style.cssText = `
    position: absolute;
    left: ${x}%;
    top: ${y}%;
    width: ${size * 2}px;
    height: ${size * 2}px;
    --dur: ${dur}s;
    --delay: ${delay}s;
    --min-op: ${minOp};
    filter: drop-shadow(0 0 ${size * 0.7}px ${color});
    overflow: visible;
    cursor: pointer;
    transition: filter 0.15s ease, transform 0.15s ease;
  `;
  svg.className = 'star-particle';
  const path = document.createElementNS(ns, 'path');
  path.setAttribute('d', chubbyStar4Path(size));
  path.setAttribute('fill', color);
  svg.appendChild(path);
  container.appendChild(svg);

  // Hover: burst of neon glow
  svg.addEventListener('mouseenter', () => {
    svg.style.opacity = '1';
    svg.style.transform = `translate(-50%, -50%) scale(${1.6 + size * 0.04})`;
    svg.style.filter = `drop-shadow(0 0 ${size*2}px ${color}) drop-shadow(0 0 ${size*4}px ${color}) drop-shadow(0 0 ${size*1.5}px #fff)`;
    svg.style.transition = 'filter 0.12s ease, transform 0.12s ease, opacity 0.12s ease';
  });
  svg.addEventListener('mouseleave', () => {
   svg.style.transform = `translate(-50%, -50%)`;
   svg.style.filter = `drop-shadow(0 0 ${size*3}px ${color}) drop-shadow(0 0 ${size*6}px ${color}) drop-shadow(0 0 ${size*2}px #fff)`;
    svg.style.transition = 'filter 0.3s ease, transform 0.3s ease, opacity 0.3s ease';
    // Re-enable twinkle animation after transition
    setTimeout(() => { svg.style.animation = ''; svg.style.opacity = ''; }, 300);
  });

  return svg;
}

function createStars(container, count, colors) {
  for (let i = 0; i < count; i++) {
    const color = colors[Math.floor(Math.random() * colors.length)];
    const isBig = Math.random() < 0.18;
    const size = isBig ? (3 + Math.random() * 4) : (2 + Math.random() * 3);
    createStar8(
      container,
      Math.random() * 100,
      Math.random() * 100,
      size,
      color,
      2 + Math.random() * 4,
      Math.random() * 4,
      0.15 + Math.random() * 0.3
    );
  }
}

// Landing page stars
createStars(document.getElementById('landing-bg'), 80,
  ['#f9a8d4', '#67e8f9', '#fde68a', '#c4b5fd', '#ffffff', '#fb7185']);

// Landing neon stars — bigger colourful chubby 4-point stars
const landingBg = document.getElementById('landing-bg');
['#f472b6','#67e8f9','#fde68a','#a78bfa','#fb923c','#34d399'].forEach((color) => {
  for (let j = 0; j < 3; j++) {

createStars(document.getElementById('archive-bg-stars'), 60,

createStars(document.getElementById('detail-bg-stars'), 50,
  ['#a78bfa', '#67e8f9', '#f9a8d4', '#ffffff']);
createStars(document.getElementById('input-bg-stars'), 60,
  ['#a78bfa', '#67e8f9', '#f9a8d4', '#ffffff']);

// Input nebula
const inputNebula = document.getElementById('input-nebula');
[
  { color: '#0d1f3c', w: 500, h: 400, l: -10, t: 50, dx: 20, dy: -10, nd: 12 },
  { color: '#1e3a5f', w: 320, h: 320, l: 55, t: 40, dx: -15, dy: 20, nd: 14, ndelay: 2 },
  { color: '#a78bfa', w: 200, h: 180, l: 10, t: 15, dx: 10, dy: 15, nd: 9, ndelay: 1 },
  { color: '#67e8f9', w: 150, h: 150, l: 70, t: 10, dx: -10, dy: 20, nd: 11, ndelay: 3 },
  { color: '#f9a8d4', w: 160, h: 130, l: 40, t: 70, dx: 15, dy: -15, nd: 10, ndelay: 1.5 },
].forEach(c => {
  const el = document.createElement('div');

  el.style.cssText = `background:${c.color}; width:${c.w}px; height:${c.h}px; left:${c.l}%; top:${c.t}%; --dx:${c.dx}px; --dy:${c.dy}px; --nd:${c.nd}s; --ndelay:${c.ndelay||0}s;`;
  inputNebula.appendChild(el);
});

// ─── SCREEN NAVIGATION ───────────────────────────
const screens = {
  landing: document.getElementById('screen-landing'),
  archive: document.getElementById('screen-archive'),
  input: document.getElementById('screen-input'),
  detail: document.getElementById('screen-detail'),
};

function showScreen(name, animate) {
  Object.entries(screens).forEach(([k, el]) => {
    if (k === name) el.classList.remove('hidden');
    else el.classList.add('hidden');
  });
}

// ─── TRANSITION: Landing → Archive ───────────────
document.getElementById('start-btn').addEventListener('click', () => {
  const overlay = document.getElementById('transition-overlay');
  const starsContainer = document.getElementById('transition-stars');
  starsContainer.innerHTML = '';

  // Generate explosion of neon chubby 4-point stars
  const colors = ['#f472b6','#67e8f9','#fde68a','#a78bfa','#fb923c','#34d399','#f87171','#60a5fa'];
  for (let i = 0; i < 60; i++) {
    const color = colors[Math.floor(Math.random() * colors.length)];
    const size = 8 + Math.random() * 18;
    const angle = Math.random() * 360;
    const dist = 30 + Math.random() * 70;
    const tx = 50 + Math.cos(angle * Math.PI / 180) * dist;
    const ty = 50 + Math.sin(angle * Math.PI / 180) * dist;
    const dur = 0.6 + Math.random() * 0.6;
    const ns = 'http://www.w3.org/2000/svg';
    const svg = document.createElementNS(ns, 'svg');
    svg.setAttribute('viewBox', `-${size} -${size} ${size*2} ${size*2}`);
    svg.style.cssText = `
      position:absolute; width:${size*2}px; height:${size*2}px;
      left:50%; top:50%;
      transform:translate(-50%,-50%) rotate(${Math.random()*45}deg);
      opacity:0;
      filter:drop-shadow(0 0 ${size*0.5}px ${color});
      transition: left ${dur}s cubic-bezier(0.2,0,0.8,1),
                  top ${dur}s cubic-bezier(0.2,0,0.8,1),
                  opacity 0.3s ease,
                  transform ${dur}s ease;
    `;
    const r = size; const c = r*0.18, t = r*0.22;
    const d = `M 0,${-r} C ${t},${-c} ${c},${-t} ${r},0 C ${c},${t} ${t},${c} 0,${r} C ${-t},${c} ${-c},${t} ${-r},0 C ${-c},${-t} ${-t},${-c} 0,${-r} Z`;
    const path = document.createElementNS(ns, 'path');
    path.setAttribute('d', d);
    path.setAttribute('fill', color);
    svg.appendChild(path);
    starsContainer.appendChild(svg);

    setTimeout(() => {
      svg.style.left = tx + '%';
      svg.style.top = ty + '%';
      svg.style.opacity = '1';
      svg.style.transform = `translate(-50%,-50%) rotate(${Math.random()*360}deg) scale(${0.5+Math.random()})`;
    }, 20 + i * 10);

    setTimeout(() => { svg.style.opacity = '0'; }, 600);
  }

  overlay.style.transition = 'opacity 0.3s ease';
  overlay.style.opacity = '0.8';
  setTimeout(() => {
    showScreen('archive');
    // ↓ 여기에 추가
    let count = 0;
    const spawnInterval = setInterval(() => {
      const colors = ['#f472b6','#67e8f9','#fde68a','#a78bfa','#fb923c','#34d399'];
      const color = colors[Math.floor(Math.random() * colors.length)];
      const size = 3 + Math.random() * 8;
      createStar8(
        document.getElementById('archive-bg-stars'),
        Math.random() * 100,
        Math.random() * 100,
        size, color,
        2 + Math.random() * 4,
        0,
        0.2 + Math.random() * 0.4
      );
      count++;
      if (count >= 30) clearInterval(spawnInterval);
    }, 80);
    // ↑ 여기까지
    renderOrbs();
    overlay.style.opacity = '0';
    starsContainer.innerHTML = '';
  }, 900);
});

// ─── RENDER STARS ────────────────────────────────
function makeStarSVG(style, size, idSuffix) {
  const ns = 'http://www.w3.org/2000/svg';
  const svg = document.createElementNS(ns, 'svg');
  const dim = size * 2 + 20;
  svg.setAttribute('viewBox', `${-size-10} ${-size-10} ${dim} ${dim}`);
  svg.setAttribute('width', dim);
  svg.setAttribute('height', dim);
  svg.setAttribute('overflow', 'visible');
  svg.style.display = 'block';
  svg.style.overflow = 'visible';

  // unique gradient id per star
  const gradId = 'sg-idea-' + idSuffix;
  const origId = style.defs.match(/id="([^"]+)"/)?.[1];
  const defsStr = style.defs.replace(origId, gradId);

  const parser = new DOMParser();
  const defsDoc = parser.parseFromString(`<svg xmlns="http://www.w3.org/2000/svg">${defsStr}</svg>`, 'image/svg+xml');
  const defsEl = document.createElementNS(ns, 'defs');
  const gradNode = defsDoc.querySelector('[id]');
  if (gradNode) {
    gradNode.id = gradId;
    defsEl.appendChild(document.importNode(gradNode, true));
  }
  svg.appendChild(defsEl);

  // Glow filter
  const filterId = 'sf-' + idSuffix;
  const filter = document.createElementNS(ns, 'filter');
  filter.setAttribute('id', filterId);
  filter.setAttribute('x', '-80%'); filter.setAttribute('y', '-80%');
  filter.setAttribute('width', '360%'); filter.setAttribute('height', '360%');
  const blur = document.createElementNS(ns, 'feGaussianBlur');
  blur.setAttribute('stdDeviation', Math.round(size * 0.45));
  blur.setAttribute('result', 'blur');
  const merge = document.createElementNS(ns, 'feMerge');
  const n1 = document.createElementNS(ns, 'feMergeNode'); n1.setAttribute('in', 'blur');
  const n2 = document.createElementNS(ns, 'feMergeNode'); n2.setAttribute('in', 'SourceGraphic');
  merge.appendChild(n1); merge.appendChild(n2);
  filter.appendChild(blur); filter.appendChild(merge);
  svg.appendChild(filter);

  // Star path
  const path = document.createElementNS(ns, 'path');
  path.setAttribute('d', ideaStarPath(size));
  path.setAttribute('fill', `url(#${gradId})`);
  path.setAttribute('filter', `url(#${filterId})`);
  svg.appendChild(path);

  // Tiny sparkle at top-right tip
  const spark = document.createElementNS(ns, 'circle');
  spark.setAttribute('cx', size * 0.28);
  spark.setAttribute('cy', -size * 0.72);
  spark.setAttribute('r', size * 0.1);
  spark.setAttribute('fill', 'white');
  spark.setAttribute('opacity', '0.85');
  svg.appendChild(spark);

  return svg;
}

function renderOrbs() {
  const field = document.getElementById('orb-field');
  const emptyState = document.getElementById('empty-state');
  Array.from(field.children).forEach(c => {
    if (!c.classList.contains('empty-state')) c.remove();
  });

  if (ideas.length === 0) {
    emptyState.style.display = 'block';
    return;
  }
  emptyState.style.display = 'none';

  const sorted = [...ideas].sort((a, b) => a.createdAt - b.createdAt);

  sorted.forEach((idea, idx) => {
    const size = idea.orbStyle.size || 52;
    const floatDur = 5 + Math.random() * 4;
    const floatDelay = Math.random() * 3;
    const rot = (Math.random() * 30 - 15).toFixed(1);

    const wrap = document.createElement('div');
    wrap.className = 'star-item';
    wrap.dataset.id = idea.id;
    wrap.style.setProperty('--float-dur', floatDur + 's');
    wrap.style.setProperty('--float-delay', floatDelay + 's');
    wrap.style.setProperty('--glow-color', idea.orbStyle.glow);
    wrap.style.setProperty('--rot', rot + 'deg');
    wrap.style.width = (size * 2 + 20) + 'px';
    wrap.style.height = (size * 2 + 20) + 'px';
    wrap.style.margin = '18px auto';

    const offsets = ['-20%', '10%', '-5%', '20%', '-15%'];
    wrap.style.marginLeft = offsets[idx % offsets.length];

    const glowDiv = document.createElement('div');
    glowDiv.className = 'star-glow-ring';

    const starSvg = makeStarSVG(idea.orbStyle, size, idea.id);
    starSvg.className = 'star-svg';

    wrap.appendChild(glowDiv);
    wrap.appendChild(starSvg);
    wrap.addEventListener('click', () => openDetail(idea.id));
    field.insertBefore(wrap, field.firstChild);
  });

  const space = document.getElementById('orb-space');
  setTimeout(() => { space.scrollTop = space.scrollHeight; }, 100);
}

// ─── ADD IDEA ────────────────────────────────────
document.getElementById('add-btn').addEventListener('click', () => {
  const ta = document.getElementById('idea-textarea');
  ta.value = '';
  ta.style.height = 'auto';
  ta.style.borderRadius = '28px';
  document.getElementById('similar-ideas').innerHTML = '';
  showScreen('input');
});

document.getElementById('input-back-btn').addEventListener('click', () => {
  showScreen('archive');
  renderOrbs();
});

// Similar ideas on pause + textarea auto-resize
let similarTimer = null;
document.getElementById('idea-textarea').addEventListener('input', function() {
  // Auto-resize
  this.style.height = 'auto';
  this.style.height = this.scrollHeight + 'px';
  // Round corners only when single line
  this.style.borderRadius = this.scrollHeight > 70 ? '20px' : '28px';

  clearTimeout(similarTimer);
  similarTimer = setTimeout(() => {
    showSimilarIdeas(document.getElementById('idea-textarea').value);
  }, 1000);
});

function showSimilarIdeas(text) {
  const container = document.getElementById('similar-ideas');
  container.innerHTML = '';
  if (!text.trim() || ideas.length === 0) return;

  const words = text.toLowerCase().split(/\s+/);
  const matches = ideas.filter(idea => {
    const ideaWords = idea.text.toLowerCase().split(/\s+/);
    return words.some(w => w.length > 2 && ideaWords.some(iw => iw.includes(w) || w.includes(iw)));
  }).slice(0, 3);

  matches.forEach((idea, i) => {
    const el = document.createElement('div');
    el.className = 'similar-orb';
    el.style.animationDelay = (i * 0.5) + 's';

    const size = 22;
    const dim = size * 2 + 8;
    const miniSvg = makeStarSVG(idea.orbStyle, size, 'sim-' + idea.id + '-' + i);
    miniSvg.style.cssText = `width:${dim}px; height:${dim}px; flex-shrink:0;`;

    const label = document.createElement('div');
    label.className = 'similar-label';
    label.textContent = idea.text.substring(0, 40) + (idea.text.length > 40 ? '...' : '');

    el.appendChild(miniSvg);
    el.appendChild(label);
    el.addEventListener('click', () => openDetail(idea.id));
    container.appendChild(el);

    setTimeout(() => el.classList.add('visible'), 50 * i);
  });
}

// ─── FINISH: Save idea ────────────────────────────
document.getElementById('finish-btn').addEventListener('click', () => {
  const text = document.getElementById('idea-textarea').value.trim();
  if (!text) return;

  const idea = {
    id: Date.now(),
    text,
    createdAt: Date.now(),
    orbStyle: randomOrbStyle(),
  };
  ideas.push(idea);
  saveIdeas();

  // Launch animation
  launchOrb(idea);
});

function launchOrb(idea) {
  const btn = document.getElementById('finish-btn');
  const rect = btn.getBoundingClientRect();
  const size = idea.orbStyle.size || 52;
  const dim = size * 2 + 20;

  const wrap = document.createElement('div');
  wrap.className = 'launch-star';
  wrap.style.cssText = `
    width: ${dim}px; height: ${dim}px;
    left: ${rect.left + rect.width/2 - dim/2}px;
    top: ${rect.top + rect.height/2 - dim/2}px;
    opacity: 1;
    transition: top 1.2s cubic-bezier(0.2, 0.8, 0.4, 1), opacity 0.4s ease 0.9s, transform 1.2s ease;
    transform: scale(1) rotate(0deg);
  `;

  const starSvg = makeStarSVG(idea.orbStyle, size, 'launch-' + idea.id);
  wrap.appendChild(starSvg);
  document.body.appendChild(wrap);

  setTimeout(() => {
    wrap.style.top = '-100px';
    wrap.style.opacity = '0';
    wrap.style.transform = 'scale(0.4) rotate(30deg)';
  }, 50);

  setTimeout(() => {
    wrap.remove();
    showScreen('archive');
    renderOrbs();
    showNotif('✦ 아이디어가 저장됐어요');
  }, 1300);
}

// ─── DETAIL (forward ref resolved below) ─────────

document.getElementById('detail-back-btn').addEventListener('click', () => {
  showScreen('archive');
  renderOrbs();
});

document.getElementById('edit-btn').addEventListener('click', () => {
  if (!isEditing) {
    isEditing = true;
    document.getElementById('detail-text').style.display = 'none';
    const ea = document.getElementById('detail-edit-area');
    ea.style.display = 'block';
    ea.focus();
    document.querySelector('.save-btn').style.display = '';
    document.querySelector('.edit-btn').style.display = 'none';
  }
});

document.getElementById('save-btn').addEventListener('click', () => {
  const newText = document.getElementById('detail-edit-area').value.trim();
  if (!newText) return;
  const idx = ideas.findIndex(i => i.id === currentDetailId);
  if (idx === -1) return;
  ideas[idx].text = newText;
  saveIdeas();
  document.getElementById('detail-text').textContent = newText;
  document.getElementById('detail-text').style.display = 'block';
  document.getElementById('detail-edit-area').style.display = 'none';
  document.querySelector('.save-btn').style.display = 'none';
  document.querySelector('.edit-btn').style.display = '';
  isEditing = false;
  showNotif('✦ 수정됐어요');
});

document.getElementById('delete-btn').addEventListener('click', () => {
  if (!confirm('이 아이디어를 삭제할까요?')) return;
  ideas = ideas.filter(i => i.id !== currentDetailId);
  saveIdeas();
  showScreen('archive');
  renderOrbs();
  showNotif('✦ 삭제됐어요');
});

// ─── NOTIFICATION ────────────────────────────────
function showNotif(msg) {
  const n = document.getElementById('notif');
  n.textContent = msg;
  n.classList.add('show');
  setTimeout(() => n.classList.remove('show'), 2500);
}

// ─── DETAIL: star hero ───────────────────────────
function openDetail(id) {
  const idea = ideas.find(i => i.id === id);
  if (!idea) return;
  currentDetailId = id;
  isEditing = false;

  const size = idea.orbStyle.size || 52;

  // Update glow ring color
  document.getElementById('detail-orb-glow').style.background =
    `radial-gradient(circle, ${idea.orbStyle.glow} 0%, transparent 70%)`;

  // Rebuild star svg
  const svgEl = document.getElementById('detail-star-svg');
  if (svgEl) {
    const newSvg = makeStarSVG(idea.orbStyle, size, 'detail-' + idea.id);
    newSvg.id = 'detail-star-svg';
    newSvg.className = 'star-svg';
    newSvg.style.cssText = `width:${size*2+20}px; height:${size*2+20}px;`;
    svgEl.replaceWith(newSvg);
  }

  const d = new Date(idea.createdAt);
  const yyyy = d.getFullYear();
  const mm = String(d.getMonth() + 1).padStart(2, '0');
  const dd = String(d.getDate()).padStart(2, '0');
  document.getElementById('detail-date').textContent = `${yyyy}.${mm}.${dd}`;
  document.getElementById('detail-text').textContent = idea.text;
  document.getElementById('detail-text').style.display = 'block';
  document.getElementById('detail-edit-area').style.display = 'none';
  document.getElementById('detail-edit-area').value = idea.text;
  document.querySelector('.save-btn').style.display = 'none';
  document.querySelector('.edit-btn').style.display = '';

  showScreen('detail');
}

window.openDetail = openDetail;
</script>
</body>
